version: "3.8"

services:
  database:
    image: postgres:16-alpine
    container_name: vitalsync-db
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - vitalsync-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: vitalsync-api
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      NODE_ENV: production
    depends_on:
      database:
        condition: service_healthy
    networks:
      - vitalsync-net

  frontend:
    build: ./frontend
    container_name: vitalsync-front
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - vitalsync-net

volumes:
  pgdata:

networks:
  vitalsync-net:
    driver: bridge
