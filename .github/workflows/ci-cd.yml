name: VitalSync CI/CD Pipeline

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/vitalsync-api
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/vitalsync-front

jobs:
  lint-and-test:
    name: "Étape 1 — Lint & Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run ESLint
        working-directory: ./backend
        run: npx eslint . --ext .js || true

      - name: Run tests
        working-directory: ./backend
        run: npm test

  build-and-push:
    name: "Étape 2 — Build Docker & Push"
    needs: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Backend
        run: |
          docker build -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} -t ${{ env.BACKEND_IMAGE }}:latest ./backend
          docker push ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.BACKEND_IMAGE }}:latest

      - name: Build & Push Frontend
        run: |
          docker build -t ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} -t ${{ env.FRONTEND_IMAGE }}:latest ./frontend
          docker push ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.FRONTEND_IMAGE }}:latest

  deploy-staging:
    name: "Étape 3 — Déploiement Staging"
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "POSTGRES_DB=vitalsync_staging" >> .env
          echo "POSTGRES_USER=staging_user" >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.STAGING_DB_PASSWORD }}" >> .env

      - name: Deploy with Docker Compose
        run: docker compose up --build -d

      - name: Wait for services
        run: sleep 15

      - name: Health Check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health)
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed with status $STATUS"
            docker compose logs backend
            exit 1
          fi
          echo "✅ Health check passed (HTTP 200)"
          curl -s http://localhost:3000/health | jq .

      - name: Cleanup
        if: always()
        run: docker compose down -v
